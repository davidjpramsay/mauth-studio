<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/mauth_icon.png" />
    <meta name="theme-color" content="#030817" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        try {
          const storedTheme = window.localStorage.getItem("mauth-studio.theme.v1");
          const theme =
            storedTheme === "dark" || storedTheme === "light"
              ? storedTheme
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.style.colorScheme = theme;
        } catch {
          // The app will apply its default theme after React loads.
        }
      })();
    </script>
    <title>Mauth Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
